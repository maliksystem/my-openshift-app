trigger:
  branches:
    include:
      - main

variables:
  acrName: 'openshiftacr'
  acrLoginServer: 'openshiftacr.azurecr.io'
  imageRepository: 'my-openshift-app'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'

stages:

# ─── Stage 1: Build and Push Image to ACR ───
- stage: Build
  displayName: 'Build and Push to ACR'
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: Docker@2
      displayName: 'Build and Push Image'
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: 'acr-connection'
        tags: |
          $(tag)
          latest

# ─── Stage 2: Deploy to ARO ───
- stage: Deploy
  displayName: 'Deploy to ARO'
  dependsOn: Build
  jobs:
  - job: DeployJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: KubernetesManifest@0
      displayName: 'Deploy to ARO Cluster'
      inputs:
        action: deploy
        kubernetesServiceConnection: 'aro-connection'
        namespace: 'default'
        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml
        containers: |
          $(acrLoginServer)/$(imageRepository):$(tag)
